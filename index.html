<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>緑園都市 簡易浸水シミュレーター</title>
  <script src="https://cesium.com/downloads/cesiumjs/releases/1.117/Build/Cesium/Cesium.js"></script>
  <link href="https://cesium.com/downloads/cesiumjs/releases/1.117/Build/Cesium/Widgets/widgets.css" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; overflow: hidden; font-family: 'Segoe UI', 'Hiragino Sans', 'Meiryo', sans-serif; }
    #cesiumContainer { width: 100%; height: 100%; }

    .panel {
      position: absolute;
      background: rgba(15, 23, 42, 0.92);
      backdrop-filter: blur(12px);
      color: #e2e8f0;
      border-radius: 12px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.4);
      z-index: 1000; user-select: none; transition: all 0.3s ease;
    }
    .panel.collapsed {
      width: 44px !important; height: 44px !important;
      padding: 0 !important; overflow: hidden;
      border-radius: 22px; cursor: pointer;
    }
    .panel-toggle {
      position: absolute; top: 8px; right: 8px;
      width: 28px; height: 28px; border: none;
      background: rgba(148,163,184,0.2); color: #94a3b8;
      border-radius: 14px; cursor: pointer; font-size: 14px;
      display: flex; align-items: center; justify-content: center; z-index: 10;
    }
    .panel-toggle:hover { background: rgba(148,163,184,0.35); }
    .panel.collapsed .panel-body { display: none; }
    .panel-icon {
      width: 44px; height: 44px;
      display: none; align-items: center; justify-content: center; font-size: 20px;
    }
    .panel.collapsed .panel-icon { display: flex; }

    #panel { top: 16px; left: 16px; width: 260px; padding: 16px; }
    #panel h1 { font-size: 15px; font-weight: 700; color: #38bdf8; margin-bottom: 2px; }
    #panel .subtitle { font-size: 10px; color: #94a3b8; margin-bottom: 12px; }
    .toggle-row {
      display: flex; align-items: center; justify-content: space-between;
      padding: 7px 0; border-top: 1px solid rgba(148,163,184,0.15);
    }
    .toggle-row span { font-size: 12px; color: #cbd5e1; }
    .toggle-switch { position: relative; width: 40px; height: 22px; cursor: pointer; }
    .toggle-switch input { opacity: 0; width: 0; height: 0; }
    .toggle-slider {
      position: absolute; top: 0; left: 0; right: 0; bottom: 0;
      background: #334155; border-radius: 11px; transition: background 0.2s;
    }
    .toggle-slider::before {
      content: ''; position: absolute;
      width: 16px; height: 16px; left: 3px; bottom: 3px;
      background: #e2e8f0; border-radius: 50%; transition: transform 0.2s;
    }
    .toggle-switch input:checked + .toggle-slider { background: #0ea5e9; }
    .toggle-switch input:checked + .toggle-slider::before { transform: translateX(18px); }
    #status {
      font-size: 10px; color: #64748b;
      margin-top: 8px; padding-top: 8px;
      border-top: 1px solid rgba(148,163,184,0.15); line-height: 1.4;
    }
    #status .ok { color: #4ade80; }
    #status .warn { color: #fbbf24; }

    #cameraPanel {
      top: 16px; right: 16px; width: 320px; padding: 14px;
      font-size: 11px; font-family: 'Consolas', 'SFMono-Regular', monospace;
    }
    #cameraPanel h2 {
      font-size: 12px; font-weight: 700; color: #a78bfa; margin-bottom: 8px;
      font-family: 'Segoe UI', 'Hiragino Sans', sans-serif;
    }
    .cam-row { display: flex; justify-content: space-between; padding: 2px 0; border-bottom: 1px solid rgba(148,163,184,0.08); }
    .cam-label { color: #94a3b8; } .cam-value { color: #e2e8f0; font-weight: 600; }
    .copy-btn {
      margin-top: 8px; width: 100%; padding: 7px; font-size: 11px;
      border: 1px solid #a78bfa; background: rgba(167,139,250,0.1); color: #a78bfa;
      border-radius: 6px; cursor: pointer; font-family: 'Segoe UI', 'Hiragino Sans', sans-serif;
    }
    .copy-btn:hover { background: rgba(167,139,250,0.2); }
    .copy-btn.copied { border-color: #4ade80; color: #4ade80; background: rgba(74,222,128,0.1); }
    #cameraPanel .hint { margin-top: 6px; font-size: 9px; color: #64748b; font-family: 'Segoe UI', 'Hiragino Sans', sans-serif; line-height: 1.3; }

    #sliderBar {
      position: absolute; bottom: 0; left: 0; right: 0;
      background: rgba(15, 23, 42, 0.92); backdrop-filter: blur(12px);
      padding: 12px 24px 16px; z-index: 1000;
      display: flex; align-items: center; gap: 16px;
    }
    #sliderBar .slider-label { font-size: 12px; color: #94a3b8; white-space: nowrap; }
    #sliderBar .slider-value { font-size: 28px; font-weight: 800; color: #38bdf8; min-width: 90px; text-align: right; line-height: 1; }
    #sliderBar .slider-value .unit { font-size: 12px; font-weight: 400; color: #64748b; margin-left: 2px; }
    #sliderBar input[type="range"] {
      -webkit-appearance: none; flex: 1; height: 8px; border-radius: 4px;
      background: linear-gradient(to right, #1e3a5f, #0ea5e9, #38bdf8); outline: none; cursor: pointer;
    }
    #sliderBar input[type="range"]::-webkit-slider-thumb {
      -webkit-appearance: none; width: 24px; height: 24px; border-radius: 50%;
      background: #38bdf8; border: 3px solid #0f172a; box-shadow: 0 0 10px rgba(56,189,248,0.5); cursor: pointer;
    }
    #rangeBtn {
      background: rgba(148,163,184,0.15); border: 1px solid #334155; color: #94a3b8;
      border-radius: 8px; padding: 4px 8px; cursor: pointer; font-size: 14px;
      white-space: nowrap; display: flex; align-items: center; gap: 2px; transition: all 0.15s;
    }
    #rangeBtn:hover { border-color: #38bdf8; color: #38bdf8; background: rgba(56,189,248,0.08); }
    #rangeLabel { font-size: 11px; font-family: 'Segoe UI', sans-serif; }

    #actionButtons {
      position: absolute; bottom: 70px; right: 16px;
      display: flex; flex-direction: column; gap: 8px; z-index: 1000;
    }
    .action-btn {
      width: 48px; height: 48px; border-radius: 24px; border: 1px solid #334155;
      background: rgba(15,23,42,0.92); backdrop-filter: blur(12px);
      color: #e2e8f0; font-size: 22px; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: all 0.2s; box-shadow: 0 4px 16px rgba(0,0,0,0.3);
      position: relative;
    }
    .action-btn:hover { border-color: #38bdf8; background: rgba(56,189,248,0.1); }
    .action-btn.active { border-color: #4ade80; background: rgba(74,222,128,0.15); color: #4ade80; }
    .action-btn .tooltip {
      position: absolute; right: 56px; white-space: nowrap;
      background: rgba(15,23,42,0.95); color: #e2e8f0;
      padding: 4px 10px; border-radius: 6px; font-size: 11px;
      pointer-events: none; opacity: 0; transition: opacity 0.15s;
    }
    .action-btn:hover .tooltip { opacity: 1; }

    #walkHint {
      position: absolute; bottom: 70px; left: 50%; transform: translateX(-50%);
      background: rgba(74,222,128,0.15); border: 1px solid #4ade80;
      color: #4ade80; padding: 8px 16px; border-radius: 8px;
      font-size: 12px; z-index: 1000; display: none; text-align: center;
      backdrop-filter: blur(12px);
    }

    #credit {
      position: absolute; bottom: 60px; left: 8px;
      font-size: 10px; color: rgba(255,255,255,0.6);
      background: rgba(0,0,0,0.5); padding: 4px 8px; border-radius: 4px; z-index: 1000;
    }

    @media (max-width: 768px) {
      #panel { width: 220px; padding: 12px; }
      #panel h1 { font-size: 13px; }
      #sliderBar { padding: 10px 12px 14px; gap: 10px; }
      #sliderBar .slider-value { font-size: 22px; min-width: 70px; }
      #actionButtons { bottom: 65px; right: 8px; }
      .action-btn { width: 42px; height: 42px; font-size: 18px; }
    }
  </style>
</head>
<body>
  <div id="cesiumContainer"></div>

  <div id="panel" class="panel">
    <div class="panel-icon">⚙️</div>
    <button class="panel-toggle" id="panelToggle">−</button>
    <div class="panel-body">
      <h1>簡易浸水シミュレーター</h1>
      <div class="subtitle">緑園都市 ─ PLATEAU 3D都市モデル</div>
      <div class="toggle-row"><span>水面を表示</span><label class="toggle-switch"><input type="checkbox" id="waterToggle" checked><span class="toggle-slider"></span></label></div>
      <div class="toggle-row"><span>建物モデルを表示</span><label class="toggle-switch"><input type="checkbox" id="buildingToggle" checked><span class="toggle-slider"></span></label></div>
      <div class="toggle-row"><span>建物の水没着色</span><label class="toggle-switch"><input type="checkbox" id="floodColorToggle" checked><span class="toggle-slider"></span></label></div>
      <div id="status">読み込み中...</div>
    </div>
  </div>

  <div id="cameraPanel" class="panel" style="display:none;">
    <div class="panel-icon">📷</div>
    <button class="panel-toggle" id="cameraPanelToggle">−</button>
    <div class="panel-body">
      <h2>📷 カメラ情報</h2>
      <div class="cam-row"><span class="cam-label">経度</span><span class="cam-value" id="camLon">-</span></div>
      <div class="cam-row"><span class="cam-label">緯度</span><span class="cam-value" id="camLat">-</span></div>
      <div class="cam-row"><span class="cam-label">高度</span><span class="cam-value" id="camAlt">-</span></div>
      <div class="cam-row"><span class="cam-label">heading</span><span class="cam-value" id="camHead">-</span></div>
      <div class="cam-row"><span class="cam-label">pitch</span><span class="cam-value" id="camPitch">-</span></div>
      <div class="cam-row"><span class="cam-label">roll</span><span class="cam-value" id="camRoll">-</span></div>
      <button class="copy-btn" id="copyBtn">📋 初期位置コードをコピー</button>
      <div class="hint">好みのアングルでコピー → コード冒頭に貼り付け</div>
    </div>
  </div>

  <div id="actionButtons">
    <button class="action-btn" id="walkBtn"><span>🚶</span><span class="tooltip">ウォークモード</span></button>
    <button class="action-btn" id="homeBtn"><span>🏠</span><span class="tooltip">初期位置に戻る</span></button>
  </div>

  <div id="walkHint">🚶 WASD 移動 ／ 左ドラッグ 見回し ／ 🚶ボタンで解除</div>

  <div id="sliderBar">
    <div class="slider-label">海抜</div>
    <div class="slider-value"><span id="waterValue">25.0</span><span class="unit">m</span></div>
    <input type="range" id="waterSlider" min="0" max="100" value="25" step="0.1">
    <button id="rangeBtn">📏<span id="rangeLabel">100</span></button>
  </div>

  <div id="credit">
    3D都市モデル（国土交通省）を加工して作成 ｜ 地理院タイル（国土地理院） ｜
    地形データ: 測量法に基づく国土地理院長承認（使用）R3JHs 778
  </div>

  <script>
    // ============================================================
    //  設定
    // ============================================================
    const PLATEAU_ION_TOKEN =
      'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.' +
      'eyJqdGkiOiJlNjk0MTM4NC1lMWI0LTQxNTgtYjcxZS01ZWJhMGJlMTE1MWQiLCJpZCI6MTQ5ODk3LCJpYXQiOjE3MTUxNTEyODZ9.' +
      '2aUmEQ2-fDsjf-XeC6-hZpwkgwLse3yXoXF4xTOvPAY';
    const TERRAIN_ASSET_ID = 2488101;

    const INITIAL_CAMERA = {
      lon: 139.518853, lat: 35.431628, height: 500.1,
      heading: 24.10, pitch: -30.23, roll: 0.00,
    };

    const DEFAULT_WATER_LEVEL = 25;
    const MAX_WATER_LEVEL = 300;
    const GEOID_HEIGHT = 37;
    const EYE_HEIGHT = 1.7;
    const WALK_SPEED = 15.0;

    const WATER_BOUNDS = { west: 139.30, south: 35.275, east: 139.70, north: 35.575 };

    const BUILDING_URLS = [
      'https://api.plateauview.mlit.go.jp/datacatalog/3dtiles/14116-bldg-lod1-texture-2024/tileset.json',
      'https://api.plateauview.mlit.go.jp/datacatalog/3dtiles/14112-bldg-lod1-texture-2024/tileset.json',
      'https://api.plateauview.mlit.go.jp/datacatalog/3dtiles/14114-bldg-lod2-texture-latest/tileset.json',
    ];

    // ============================================================
    //  メイン
    // ============================================================
    Cesium.Ion.defaultAccessToken = PLATEAU_ION_TOKEN;
    const statusEl = document.getElementById('status');
    function setStatus(html) { statusEl.innerHTML = html; }
    let currentWaterLevel = DEFAULT_WATER_LEVEL + GEOID_HEIGHT;

    (async () => {
      try {
        setStatus('Viewerを初期化中...');
        const viewer = new Cesium.Viewer('cesiumContainer', {
          baseLayer: false,
          terrainProvider: await Cesium.CesiumTerrainProvider.fromIonAssetId(TERRAIN_ASSET_ID),
          animation: false, timeline: false, homeButton: false, geocoder: false,
          sceneModePicker: false, baseLayerPicker: false, navigationHelpButton: false,
          fullscreenButton: false, selectionIndicator: false, infoBox: false,
        });
        viewer.scene.globe.depthTestAgainstTerrain = true;
        try {
          viewer.imageryLayers.addImageryProvider(new Cesium.UrlTemplateImageryProvider({
            url: 'https://cyberjapandata.gsi.go.jp/xyz/seamlessphoto/{z}/{x}/{y}.jpg',
            maximumLevel: 18, credit: '地理院タイル',
          }));
        } catch (e) {
          viewer.imageryLayers.addImageryProvider(new Cesium.OpenStreetMapImageryProvider({ url: 'https://tile.openstreetmap.org/' }));
        }
        viewer.scene.globe.enableLighting = true;
        setStatus('<span class="ok">✓</span> Viewer初期化完了');

        // ── シェーダー ──
        const buildingShader = new Cesium.CustomShader({
          uniforms: {
            u_waterLevel: { type: Cesium.UniformType.FLOAT, value: DEFAULT_WATER_LEVEL + GEOID_HEIGHT },
            u_colorOn: { type: Cesium.UniformType.FLOAT, value: 1.0 },
          },
          fragmentShaderText: `
            void fragmentMain(FragmentInput fsInput, inout czm_modelMaterial material) {
              if (u_colorOn < 0.5 || u_waterLevel <= 0.0) return;
              vec3 p = fsInput.attributes.positionWC;
              float a_w = 6378137.0 + u_waterLevel;
              float b_w = 6356752.3 + u_waterLevel;
              float test = (p.x * p.x + p.y * p.y) / (a_w * a_w) + (p.z * p.z) / (b_w * b_w);
              if (test < 1.0) {
                float depth = clamp((1.0 - test) * 637813.0, 0.0, 1.0);
                material.diffuse = mix(material.diffuse, vec3(0.9, 0.1, 0.05), depth * 0.8);
              }
            }
          `,
        });

        // ── 建物データ ──
        const tilesets = [];
        let loadedCount = 0;
        for (const url of BUILDING_URLS) {
          try {
            setStatus(`建物データ読み込み中... (${loadedCount}/${BUILDING_URLS.length})`);
            const ts = await Cesium.Cesium3DTileset.fromUrl(url);
            ts.customShader = buildingShader;
            viewer.scene.primitives.add(ts);
            tilesets.push(ts);
            loadedCount++;
          } catch (e) { console.warn('読み込み失敗:', url, e.message); }
        }
        if (tilesets.length > 0) setStatus(`<span class="ok">✓</span> 建物 ${tilesets.length}件 読み込み完了`);

        // ── カメラ ──
        function flyToHome(duration) {
          viewer.camera.flyTo({
            destination: Cesium.Cartesian3.fromDegrees(INITIAL_CAMERA.lon, INITIAL_CAMERA.lat, INITIAL_CAMERA.height),
            orientation: { heading: Cesium.Math.toRadians(INITIAL_CAMERA.heading), pitch: Cesium.Math.toRadians(INITIAL_CAMERA.pitch), roll: 0 },
            duration,
          });
        }
        flyToHome(2);

        // ── 水面 ──
        const waterEntity = viewer.entities.add({
          rectangle: {
            coordinates: Cesium.Rectangle.fromDegrees(WATER_BOUNDS.west, WATER_BOUNDS.south, WATER_BOUNDS.east, WATER_BOUNDS.north),
            height: new Cesium.CallbackProperty(() => currentWaterLevel, false),
            material: new Cesium.Color(0.1, 0.3, 0.8, 0.3),
            granularity: Cesium.Math.toRadians(0.005),
          },
        });

        // ── 水位スライダー ──
        const slider = document.getElementById('waterSlider');
        const valueDisplay = document.getElementById('waterValue');
        function updateWaterLevel(level) {
          currentWaterLevel = level + GEOID_HEIGHT;
          valueDisplay.textContent = level.toFixed(1);
          buildingShader.setUniform('u_waterLevel', level + GEOID_HEIGHT);
        }
        slider.value = DEFAULT_WATER_LEVEL;
        updateWaterLevel(DEFAULT_WATER_LEVEL);
        slider.addEventListener('input', (e) => updateWaterLevel(parseFloat(e.target.value)));

        document.getElementById('waterToggle').addEventListener('change', (e) => { waterEntity.show = e.target.checked; });
        document.getElementById('buildingToggle').addEventListener('change', (e) => { tilesets.forEach(ts => ts.show = e.target.checked); });
        document.getElementById('floodColorToggle').addEventListener('change', (e) => { buildingShader.setUniform('u_colorOn', e.target.checked ? 1.0 : 0.0); });

        const ranges = [100, 200, 300];
        let rangeIndex = 0;
        document.getElementById('rangeBtn').addEventListener('click', () => {
          rangeIndex = (rangeIndex + 1) % ranges.length;
          slider.max = ranges[rangeIndex];
          document.getElementById('rangeLabel').textContent = ranges[rangeIndex];
          if (parseFloat(slider.value) > ranges[rangeIndex]) { slider.value = ranges[rangeIndex]; updateWaterLevel(ranges[rangeIndex]); }
        });

        // ── ホームボタン ──
        document.getElementById('homeBtn').addEventListener('click', () => {
          // ウォークモード中なら状態だけリセット（アニメーションなし）
          if (walkMode) {
            walkMode = false;
            walkBtn.classList.remove('active');
            walkHint.style.display = 'none';
            sscc.enableRotate = true;
            sscc.enableZoom = true;
            sscc.enableTilt = true;
            sscc.enableTranslate = true;
            sscc.enableLook = true;
          }
          // 実行中のアニメーションをキャンセル
          if (flyAnim) { flyAnim.cancel = true; flyAnim = null; flyAnimating = false; }
          flyToHome(1.5);
        });

        // ============================================================
        //  ウォークモード
        // ============================================================
        let walkMode = false;
        let flyAnimating = false;
        const walkKeys = { w: false, a: false, s: false, d: false };
        const walkBtn = document.getElementById('walkBtn');
        const walkHint = document.getElementById('walkHint');
        const sscc = viewer.scene.screenSpaceCameraController;
        const canvas = viewer.scene.canvas;

        // マウス見回し用
        let mouseDragging = false;
        let lastMouseX = 0, lastMouseY = 0;
        const LOOK_SENSITIVITY = 0.003;

        // カメラの視線の先の地面を取得
        function getLookAtGroundPosition() {
          const ray = viewer.camera.getPickRay(new Cesium.Cartesian2(
            canvas.clientWidth / 2, canvas.clientHeight / 2
          ));
          if (!ray) return null;
          const hit = viewer.scene.globe.pick(ray, viewer.scene);
          return hit || null;
        }

        // ── 直線移動アニメーション（緯度経度高さベース） ──
        let flyAnim = null;

        function linearFly(dLon, dLat, dH, destOri, duration, onComplete) {
          const sp = viewer.camera.positionCartographic;
          const sLon = sp.longitude, sLat = sp.latitude, sH = sp.height;
          const sHead = viewer.camera.heading, sPitch = viewer.camera.pitch;
          const startTime = performance.now();
          const ms = duration * 1000;

          if (flyAnim) flyAnim.cancel = true;
          const anim = { cancel: false };
          flyAnim = anim;
          flyAnimating = true;

          let hDiff = destOri.heading - sHead;
          if (hDiff > Math.PI) hDiff -= 2 * Math.PI;
          if (hDiff < -Math.PI) hDiff += 2 * Math.PI;

          function step() {
            if (anim.cancel) return;
            const rawT = Math.min((performance.now() - startTime) / ms, 1.0);
            const t = rawT < 0.5 ? 2 * rawT * rawT : 1 - Math.pow(-2 * rawT + 2, 2) / 2;

            viewer.camera.setView({
              destination: Cesium.Cartesian3.fromRadians(
                Cesium.Math.lerp(sLon, dLon, t),
                Cesium.Math.lerp(sLat, dLat, t),
                Cesium.Math.lerp(sH, dH, t)
              ),
              orientation: {
                heading: sHead + hDiff * t,
                pitch: Cesium.Math.lerp(sPitch, destOri.pitch, t),
                roll: 0,
              },
            });

            if (rawT < 1.0) requestAnimationFrame(step);
            else { flyAnim = null; flyAnimating = false; if (onComplete) onComplete(); }
          }
          requestAnimationFrame(step);
        }

        function toggleWalkMode() {
          walkMode = !walkMode;
          walkBtn.classList.toggle('active', walkMode);
          walkHint.style.display = walkMode ? 'block' : 'none';

          if (walkMode) {
            const groundHit = getLookAtGroundPosition();
            let tc;
            if (groundHit) {
              tc = Cesium.Cartographic.fromCartesian(groundHit);
            } else {
              tc = viewer.camera.positionCartographic.clone();
            }
            const gh = viewer.scene.globe.getHeight(tc);
            const h = (gh !== undefined ? gh : 0) + EYE_HEIGHT;

            linearFly(
              tc.longitude, tc.latitude, h,
              { heading: viewer.camera.heading, pitch: 0, roll: 0 },
              2.5,
              () => {
                sscc.enableRotate = false;
                sscc.enableZoom = false;
                sscc.enableTilt = false;
                sscc.enableTranslate = false;
                sscc.enableLook = false;
              }
            );
          } else {
            sscc.enableRotate = true;
            sscc.enableZoom = true;
            sscc.enableTilt = true;
            sscc.enableTranslate = true;
            sscc.enableLook = true;

            const pos = viewer.camera.positionCartographic;
            const heading = viewer.camera.heading;
            const backDist = 150.0 / 6371000.0;
            const nLon = pos.longitude - Math.sin(heading) * backDist;
            const nLat = pos.latitude - Math.cos(heading) * backDist;
            const gh = viewer.scene.globe.getHeight(pos) || 0;

            linearFly(
              nLon, nLat, gh + 120,
              { heading: heading, pitch: Cesium.Math.toRadians(-35), roll: 0 },
              2.0, null
            );
          }
        }

        walkBtn.addEventListener('click', toggleWalkMode);

        // ── マウスイベント（CesiumJS のイベントシステムで見回し） ──
        const walkHandler = new Cesium.ScreenSpaceEventHandler(canvas);

        walkHandler.setInputAction((click) => {
          if (!walkMode) return;
          mouseDragging = true;
          lastMouseX = click.position.x;
          lastMouseY = click.position.y;
        }, Cesium.ScreenSpaceEventType.LEFT_DOWN);

        walkHandler.setInputAction((movement) => {
          if (!walkMode || !mouseDragging) return;
          const dx = movement.endPosition.x - movement.startPosition.x;
          const dy = movement.endPosition.y - movement.startPosition.y;

          viewer.camera.setView({
            orientation: {
              heading: viewer.camera.heading + dx * LOOK_SENSITIVITY,
              pitch: Math.max(
                Cesium.Math.toRadians(-80),
                Math.min(Cesium.Math.toRadians(60), viewer.camera.pitch - dy * LOOK_SENSITIVITY)
              ),
              roll: 0,
            },
          });
        }, Cesium.ScreenSpaceEventType.MOUSE_MOVE);

        walkHandler.setInputAction(() => {
          mouseDragging = false;
        }, Cesium.ScreenSpaceEventType.LEFT_UP);

        // ── キーボード ──
        document.addEventListener('keydown', (e) => {
          if (!walkMode) return;
          const key = e.key.toLowerCase();
          if (key in walkKeys) { walkKeys[key] = true; e.preventDefault(); }
        });
        document.addEventListener('keyup', (e) => {
          const key = e.key.toLowerCase();
          if (key in walkKeys) walkKeys[key] = false;
        });

        // ── 毎フレーム処理 ──
        let lastTime = performance.now();
        let smoothHeight = 0;

        viewer.scene.preRender.addEventListener(() => {
          if (!walkMode || flyAnimating) { lastTime = performance.now(); smoothHeight = 0; return; }

          const now = performance.now();
          const dt = Math.min((now - lastTime) / 1000, 0.1);
          lastTime = now;

          let forward = 0, right = 0;
          if (walkKeys.w) forward += 1;
          if (walkKeys.s) forward -= 1;
          if (walkKeys.a) right -= 1;
          if (walkKeys.d) right += 1;

          const camPos = viewer.camera.positionCartographic;
          const heading = viewer.camera.heading;

          // 1. 先に移動先の水平位置を計算
          let newLon = camPos.longitude;
          let newLat = camPos.latitude;

          if (forward !== 0 || right !== 0) {
            const moveDist = WALK_SPEED * dt;
            const mToRad = 1.0 / 6371000.0;
            const cosLat = Math.cos(camPos.latitude) || 0.001;

            let dLat = 0, dLon = 0;
            if (forward !== 0) {
              dLat += Math.cos(heading) * forward * moveDist * mToRad;
              dLon += Math.sin(heading) * forward * moveDist * mToRad / cosLat;
            }
            if (right !== 0) {
              dLat -= Math.sin(heading) * right * moveDist * mToRad;
              dLon += Math.cos(heading) * right * moveDist * mToRad / cosLat;
            }
            newLon += dLon;
            newLat += dLat;
          }

          // 2. 移動先の地面の高さを取得
          const groundHeight = viewer.scene.globe.getHeight(new Cesium.Cartographic(newLon, newLat));
          const targetH = (groundHeight !== undefined ? groundHeight : (camPos.height - EYE_HEIGHT)) + EYE_HEIGHT;

          // 3. 高さをスムーズに補間
          if (smoothHeight === 0) smoothHeight = targetH;
          smoothHeight += (targetH - smoothHeight) * Math.min(dt * 6, 1);

          // 4. 計算済みの位置にカメラをセット
          viewer.camera.position = Cesium.Cartesian3.fromRadians(newLon, newLat, smoothHeight);
        });

        // ── カメラ情報 ──
        const camEls = { lon: document.getElementById('camLon'), lat: document.getElementById('camLat'), alt: document.getElementById('camAlt'), head: document.getElementById('camHead'), pitch: document.getElementById('camPitch'), roll: document.getElementById('camRoll') };
        function getCameraInfo() { const p = viewer.camera.positionCartographic; return { lon: Cesium.Math.toDegrees(p.longitude), lat: Cesium.Math.toDegrees(p.latitude), height: p.height, heading: Cesium.Math.toDegrees(viewer.camera.heading), pitch: Cesium.Math.toDegrees(viewer.camera.pitch), roll: Cesium.Math.toDegrees(viewer.camera.roll) }; }
        viewer.camera.changed.addEventListener(() => { const i = getCameraInfo(); camEls.lon.textContent=i.lon.toFixed(6); camEls.lat.textContent=i.lat.toFixed(6); camEls.alt.textContent=i.height.toFixed(1); camEls.head.textContent=i.heading.toFixed(2); camEls.pitch.textContent=i.pitch.toFixed(2); camEls.roll.textContent=i.roll.toFixed(2); });
        viewer.camera.percentageChanged = 0.001;
        document.getElementById('copyBtn').addEventListener('click', () => { const i = getCameraInfo(); const code=`const INITIAL_CAMERA = {\n  lon: ${i.lon.toFixed(6)},\n  lat: ${i.lat.toFixed(6)},\n  height: ${i.height.toFixed(1)},\n  heading: ${i.heading.toFixed(2)},\n  pitch: ${i.pitch.toFixed(2)},\n  roll: ${i.roll.toFixed(2)},\n};`; navigator.clipboard.writeText(code).then(()=>{ const b=document.getElementById('copyBtn'); b.textContent='✅ コピーしました！'; b.classList.add('copied'); setTimeout(()=>{b.textContent='📋 初期位置コードをコピー';b.classList.remove('copied');},2000); }); });

        // ── パネル折りたたみ ──
        function setupToggle(pid, tid) { const p=document.getElementById(pid), t=document.getElementById(tid); t.addEventListener('click',(e)=>{e.stopPropagation();p.classList.toggle('collapsed');t.textContent=p.classList.contains('collapsed')?'+':'−';}); p.addEventListener('click',()=>{if(p.classList.contains('collapsed')){p.classList.remove('collapsed');t.textContent='−';}}); }
        setupToggle('panel','panelToggle');
        setupToggle('cameraPanel','cameraPanelToggle');
        if(tilesets.length>0) setStatus('<span class="ok">✓</span> 準備完了');

      } catch(err) { console.error(err); setStatus(`<span class="err">✗ エラー:</span> ${err.message}`); }
    })();
  </script>
</body>
</html>
